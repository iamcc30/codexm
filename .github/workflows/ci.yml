name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Verify modules
        run: go mod verify
      - name: Check formatting
        run: |
          gofmt -w .
          git diff --exit-code
      - name: Vet
        run: go vet ./...
      - name: Test with race detector
        run: go test -race ./...
      - name: Fuzz JSONL object decoding
        run: go test ./internal/session -run '^$' -fuzz '^FuzzDecodeObject$' -fuzztime 10s
      - name: Fuzz portable paths
        run: go test ./internal/session -run '^$' -fuzz '^FuzzSafeRelative$' -fuzztime 10s
      - name: Fuzz profile names
        run: go test ./internal/config -run '^$' -fuzz '^FuzzValidateProfileName$' -fuzztime 10s

  cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: go.sum
      - run: go test ./...
      - run: go build ./cmd/codexm
