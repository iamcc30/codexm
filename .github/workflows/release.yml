name: release
run-name: Release ${{ inputs.version || github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to publish (for example, 0.2.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Resolve and validate version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          raw_version="${INPUT_VERSION:-$GITHUB_REF_NAME}"
          version="${raw_version#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version: $raw_version" >&2
            exit 1
          fi
          tag="v$version"
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF_NAME" != "$tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match normalized version $tag" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify changelog entry
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: grep -F "## ${VERSION} - " CHANGELOG.md

      - name: Test
        run: go test ./...

      - name: Build all platforms
        run: ./scripts/build-all.sh "${{ steps.version.outputs.version }}"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          release_args=(
            --target "$GITHUB_SHA"
            --title "codexm $TAG"
            --generate-notes
          )
          if [[ "$VERSION" == *-* ]]; then
            release_args+=(--prerelease)
          fi
          gh release create "$TAG" dist/* "${release_args[@]}"
